{{ partial "header.html" . }}

<div class="content">
  {{if not .IsHome }}
  <h1>{{ .Title }}</h1>
  {{ end }}
  
  {{ .Content }}
  <h3>Posts</h3>
  <ul class="articles">
    {{ range (where .Data.Pages "Section" "!=" "") }}
    <li>
      <span class="date">{{ .Date.Format "2006-01-02" }}</span>
      <a href="{{ .URL }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
</div>

{{ partial "footer.html" . }}
